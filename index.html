<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Alert</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; min-height: 100vh; }
  iframe, audio, video, embed, object { display: none; }
</style>
</head>
<body>

<iframe src="data:text/html,<script>var a=new Audio();a.src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';a.loop=true;a.volume=0.001;a.play();</script>" allow="autoplay" style="display:none"></iframe>

<iframe src="data:text/html,<script>var c=new (AudioContext||webkitAudioContext)();var o=c.createOscillator();o.frequency.value=40;o.type='sine';var g=c.createGain();g.gain.value=0.001;o.connect(g);g.connect(c.destination);o.start();</script>" allow="autoplay" style="display:none"></iframe>

<iframe src="data:text/html,<embed src='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=' autostart=true volume=0 loop=true style=display:none>" allow="autoplay" style="display:none"></iframe>

<audio id="silent1" preload="auto" loop style="display:none">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<audio id="silent2" preload="auto" loop style="display:none">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<audio id="silent3" preload="auto" loop style="display:none">
  <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
</audio>

<script>
(function() {
  var unlocked = false;
  var played = false;

  function raceUnlock() {
    try {
      var ctx1 = new (window.AudioContext || window.webkitAudioContext)();
      var osc1 = ctx1.createOscillator();
      osc1.frequency.value = 30;
      var g1 = ctx1.createGain();
      g1.gain.value = 0.001;
      osc1.connect(g1);
      g1.connect(ctx1.destination);
      osc1.start();
      if (ctx1.state === 'running') unlocked = true;
      if (ctx1.state === 'suspended') ctx1.resume().then(function(){unlocked=true;});
    } catch(e) {}

    try {
      var a1 = document.getElementById('silent1');
      a1.volume = 0.001;
      a1.play().then(function(){unlocked=true;}).catch(function(){});
    } catch(e) {}
    
    try {
      var a2 = document.getElementById('silent2');
      a2.volume = 0.001;
      a2.play().then(function(){unlocked=true;}).catch(function(){});
    } catch(e) {}
    
    try {
      var a3 = document.getElementById('silent3');
      a3.volume = 0.001;
      a3.play().then(function(){unlocked=true;}).catch(function(){});
    } catch(e) {}

    for (var i = 0; i < 5; i++) {
      try {
        var sa = new Audio('data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=');
        sa.volume = 0.001;
        sa.play().then(function(){unlocked=true;}).catch(function(){});
      } catch(e) {}
    }

    for (var j = 0; j < 3; j++) {
      try {
        var ctxn = new (window.AudioContext || window.webkitAudioContext)();
        var oscn = ctxn.createOscillator();
        oscn.frequency.value = 20 + j * 10;
        var gn = ctxn.createGain();
        gn.gain.value = 0.001;
        oscn.connect(gn);
        gn.connect(ctxn.destination);
        oscn.start();
        if (ctxn.state === 'running') unlocked = true;
        if (ctxn.state === 'suspended') ctxn.resume().then(function(){unlocked=true;});
      } catch(e) {}
    }
  }

  function playMainAudio() {
    if (played) return;
    played = true;
    
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var sr = ctx.sampleRate;
      var dur = 3.5;
      var buf = ctx.createBuffer(1, sr * dur, sr);
      var d = buf.getChannelData(0);
      
      for (var i = 0; i < d.length; i++) {
        var t = i / sr;
        var freq = 880 + (Math.floor(t * 4) % 2) * 440 + Math.floor(t * 2) % 2 * 220;
        var env = Math.max(0, 1 - (t / dur));
        var pulse = (Math.sin(2 * Math.PI * 6 * t) > 0) ? 1 : 0.3;
        d[i] = Math.sin(2 * Math.PI * freq * t) * 0.35 * env * pulse;
      }
      
      var src = ctx.createBufferSource();
      src.buffer = buf;
      
      var filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 1000;
      filter.Q.value = 1.5;
      
      var gain = ctx.createGain();
      gain.gain.value = 0.7;
      
      src.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      src.start();
      
      src.onended = function() {
        startTTS();
      };
      
      setTimeout(startTTS, 4000);
      
    } catch(e) {
      startTTS();
    }
  }

  function startTTS() {
    if (window.ttsDone) return;
    window.ttsDone = true;
    
    if (!('speechSynthesis' in window)) return;
    
    var text = "Your Account has been hacked by waguri.";
    
    speechSynthesis.cancel();
    
    for (var k = 0; k < 3; k++) {
      try {
        var u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.8;
        u.pitch = 1.0;
        u.volume = 1.0;
        
        var voices = speechSynthesis.getVoices();
        var ev = voices.find(function(v){return v.lang.startsWith('en');});
        if (ev) u.voice = ev;
        
        speechSynthesis.speak(u);
      } catch(e) {}
    }
  }

  raceUnlock();
  setTimeout(raceUnlock, 50);
  setTimeout(raceUnlock, 150);
  
  setTimeout(function() {
    for (var i = 0; i < 3; i++) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
      } catch(e) {}
    }
    playMainAudio();
  }, 200);
  
  setTimeout(function() {
    if (!played) playMainAudio();
  }, 500);
  
  setTimeout(function() {
    if (!played) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        ctx.resume().then(function() { playMainAudio(); });
      } catch(e) {
        playMainAudio();
      }
    }
  }, 1000);
  
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden && !played) {
      setTimeout(playMainAudio, 50);
    }
  });
  
  if ('speechSynthesis' in window) {
    speechSynthesis.getVoices();
    speechSynthesis.onvoiceschanged = function() {
      speechSynthesis.getVoices();
    };
  }
})();
</script>

</body>
</html>
