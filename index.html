<!DOCTYPE html>
<html lang="en">
<body>
    <h2>Security Research: Media Execution During Redirect</h2>
    <button id="triggerBtn">Start Test & Redirect</button>

    <script>
        const btn = document.getElementById('triggerBtn');

        btn.addEventListener('click', () => {
            // 1. Inisialisasi Audio Element
          const audio = new Audio('rusdi.mp3'); // Ganti dengan path file mp3 lokal atau URL publik
            
            // 2. Coba memutar audio
            audio.play().then(() => {
                console.log("[PoC] Audio started");
            }).catch(e => {
                console.warn("[PoC] Autoplay blocked, required user interaction:", e);
            });

            // 3. Melakukan navigasi
            setTimeout(() => {
                window.location.replace('https://google.com');
            }, 500);
        });
    </script>
</body>
</html>
