<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PoC Security Research: Navigation Race</title>
</head>
<body>
    <h2>Riset: Media Lifecycle Persistence</h2>
    <p>Klik tombol untuk memicu race antara Audio dan Navigasi.</p>
    <button id="raceBtn">Eksekusi Uji</button>

    <script>
        document.getElementById('raceBtn').addEventListener('click', () => {
            // 1. Inisialisasi AudioContext untuk menguji persistensi media
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            gainNode.gain.value = 0.1; // Volume rendah untuk pengujian
            oscillator.start();

            console.log("[PoC] Media context started.");

            // 2. Race Condition: Memicu navigasi tepat setelah perintah start
            // Teknik ini menguji apakah navigasi 'menang' sebelum cleanup media terjadi
            setTimeout(() => {
                console.log("[PoC] Navigasi ke Google dipicu...");
                window.location.replace('https://www.google.com');
            }, 50); 
        });
    </script>
</body>
</html>
