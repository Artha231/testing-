<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio Controller</title>
  <style>
    body { font-family: sans-serif; background: #222; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { text-align: center; padding: 2rem; border: 1px solid #444; }
    button { padding: 15px 30px; cursor: pointer; font-size: 1rem; border: none; background: #007bff; color: white; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Audio Test</h2>
    <button id="btn">PLAY & REDIRECT</button>
    <p id="msg"></p>
  </div>

  <script>
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');

    btn.onclick = async () => {
      try {
        // 1. Inisialisasi AudioContext (Harus dipicu oleh interaksi user)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const response = await fetch('rusdi.mp3');
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);
        source.start();

        msg.textContent = "Audio jalan, mengarahkan...";

        // 2. Redirect setelah audio terpicu
        setTimeout(() => {
          window.location.href = 'https://www.google.com';
        }, 1000);

      } catch (err) {
        msg.textContent = "Error: " + err.message;
      }
    };
  </script>
</body>
</html>
