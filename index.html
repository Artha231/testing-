<!DOCTYPE html>
<html lang="id">
<body>
    <h3>Riset: Permission Policy Consistency</h3>
    <button id="testBtn">Jalankan Uji Delegasi</button>
    <div id="log"></div>

    <script>
        document.getElementById('testBtn').addEventListener('click', () => {
            const log = document.getElementById('testBtn');
            
            // 1. Membuat Iframe dengan Izin Autoplay
            const frame = document.createElement('iframe');
            frame.setAttribute('allow', 'autoplay');
            frame.style.display = 'none';
            document.body.appendChild(frame);

            // 2. Mengisi Iframe dengan konten yang mencoba autoplay
            frame.srcdoc = `
                <html>
                <body>
                    <audio id="audio" src="rusdi.mp3" loop></audio>
                    <script>
                        const audio = document.getElementById('audio');
                        audio.play()
                            .then(() => parent.postMessage('SUCCESS: Iframe Autoplay', '*'))
                            .catch(e => parent.postMessage('BLOCKED: Iframe Autoplay', '*'));
                    <\/script>
                </body>
                </html>
            `;

            // 3. Mendengarkan hasil delegasi
            window.addEventListener('message', (event) => {
                const p = document.createElement('p');
                p.textContent = event.data;
                document.body.appendChild(p);
            });
        });
    </script>
</body>
</html>
