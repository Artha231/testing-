<!DOCTYPE html>
<html lang="id">
<body>
    <h3>Riset: Autoplay Tanpa Interaksi</h3>
    <div id="status">Menunggu inisialisasi...</div>

    <script>
        // Fungsi langsung dijalankan saat skrip dimuat (IIFE)
        (function() {
            const status = document.getElementById('status');
            
            // Membuat iframe segera saat halaman di-load
            const frame = document.createElement('iframe');
            // Menambahkan atribut allow autoplay agar diizinkan
            frame.setAttribute('allow', 'autoplay');
            frame.style.display = 'none';
            document.body.appendChild(frame);

            // Mengisi konten iframe
            frame.srcdoc = `
                <html>
                <body>
                    <audio id="audio" src="rusdi.mp3" loop></audio>
                    <script>
                        const audio = document.getElementById('audio');
                        // Mencoba memutar audio segera setelah iframe dimuat
                        audio.play()
                            .then(() => parent.postMessage('SUCCESS: Autoplay Tanpa Klik', '*'))
                            .catch(e => parent.postMessage('BLOCKED: Autoplay Perlu Gesture', '*'));
                    <\/script>
                </body>
                </html>
            `;

            // Menerima hasil
            window.addEventListener('message', (event) => {
                status.textContent = event.data;
            });
        })();
    </script>
</body>
</html>
